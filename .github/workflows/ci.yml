name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run Python unit tests
        env:
          PYTHONDONTWRITEBYTECODE: 1
        run: |
          python -m pytest tests/ -v --tb=short \
            --ignore=tests/test_concurrent_search.py \
            --ignore=tests/test_searxng.py \
            --ignore=tests/test_brave.py \
            --ignore=tests/test_google_api_direct.py \
            --ignore=tests/test_health_checks.py \
            --ignore=tests/test_search_llm.py \
            --ignore=tests/test_retrieval_eval.py \
            --ignore=tests/test_retrieval_eval_reporting.py \
            --ignore=tests/test_service_external.py \
            --ignore=tests/test_phase2.py \
            --ignore=tests/test_comprehensive.py \
            --ignore=tests/search_google_api_detailed.py \
            --ignore=tests/search_google_api_guide.py \
            --ignore=tests/test_crawler_proxy_retry.py \
            --ignore=tests/test_persistent_cache_integration.py \
            --ignore=tests/test_rest_server_integration.py \
            --ignore=tests/test_ddg_fetch_and_rerank.py

      - name: Run shell healthcheck tests
        run: bash tests/test_healthcheck.sh

  compat-check:
    name: Compat shim verification (Python 3.10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install minimal deps for compat test
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio

      - name: Verify asyncio.timeout polyfill activates on 3.10
        run: |
          python -c "
          import asyncio, sys
          assert sys.version_info < (3, 11), 'Expected Python < 3.11'
          # Before importing compat, asyncio.timeout should not exist
          assert not hasattr(asyncio, 'timeout'), 'asyncio.timeout should not exist before compat import'
          from src import compat
          assert hasattr(asyncio, 'timeout'), 'asyncio.timeout should exist after compat import'
          print('PASS: polyfill correctly installs asyncio.timeout on Python', sys.version)
          "

      - name: Run compat unit tests
        run: python -m pytest tests/test_compat.py -v --tb=short
