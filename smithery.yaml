# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required: []
    properties:
      googleApiKey:
        type: string
        description: (Optional) Google Custom Search Engine API key.
      googleCseId:
        type: string
        description: (Optional) Google Custom Search Engine ID.
      braveApiKey:
        type: string
        description: (Optional) Brave Search API key (2000 queries/month free).
      searxngBaseUrl:
        type: string
        description: (Optional) SearXNG instance URL (e.g. http://localhost:28981).
  commandFunction:
    |-
    (config) => ({
      command: 'python',
      args: ['src/index.py'],
      env: {
        ...(config.googleApiKey && { GOOGLE_API_KEY: config.googleApiKey }),
        ...(config.googleCseId && { GOOGLE_CSE_ID: config.googleCseId }),
        ...(config.braveApiKey && { BRAVE_API_KEY: config.braveApiKey }),
        ...(config.searxngBaseUrl && { SEARXNG_BASE_URL: config.searxngBaseUrl }),
      },
    })
